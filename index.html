<!DOCTYPE html>
<html>
<head>
  <title>Service Request</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      background-color: #e3f2fd;
      background-image: url('img/pbc1.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: 400px auto;
      background-blend-mode: lighten;
      margin: 0;
      padding: 15px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #0d47a1;
    }

    label {
      margin-top: 15px;
      display: block;
      font-weight: 600;
      color: #0d47a1;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px;
      margin-top: 5px;
      border-radius: 12px;
      border: 2px solid #90caf9;
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      padding: 16px;
      width: 100%;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 18px;
    }

    /* 🔥 Preview */
    #preview {
      margin-top: 10px;
      text-align: center;
    }

    #preview img, #preview video {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    /* 🔥 Loading */
    .loading {
      display: none;
      text-align: center;
      margin-top: 10px;
      color: #1976d2;
    }

    /* 🔥 Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 12px 20px;
      border-radius: 20px;
      display: none;
    }
  </style>
</head>

<body>

<div class="container">
<h2>Service Request</h2>

<form name="Form Responses 1">

<label>ชื่อบริษัท</label>
<select name="ชื่อบริษัท" required>
<option value="">-- เลือก --</option>
<option>บริษัท สยามฟูด เซอร์วิส จำกัด(สาขาลำลูกกา)</option>
<option>บริษัท สยามฟูด เซอร์วิส จำกัด(สาขาอยุธยา)</option>
</select>

<label>ชื่อผู้แจ้งและเบอร์ติดต่อ</label>
<input type="text" name="ชื่อผู้แจ้งและเบอร์ติดต่อ" required>

<label>รุ่นอุปกรณ์</label>
<select name="รุ่นอุปกรณ์" required>
<option value="">-- เลือก --</option>
<option>MH241</option>
<option>iData K8C</option>
<option>K3 Pro</option>
<option>WR30</option>
<option>VM3A</option>
<option>Accessory อื่นๆ</option>
</select>

<label>ปัญหาที่พบ</label>
<textarea name="ปัญหาที่พบ" rows="3" required></textarea>

<label>แนบไฟล์</label>
<input type="file" id="fileInput" accept="image/*,video/*" capture="environment">

<div id="preview"></div>

<button type="submit">บันทึก</button>

<div class="loading" id="loading">⏳ กำลังอัปโหลด...</div>

</form>
</div>

<div class="toast" id="toast"></div>

<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbyriNnK7MS_9XBYipHsTjaBll4QKiTWiexbPgFAiqtJnOCFjWK2-pCWlRYV8ElMf_zOGA/exec'
const form = document.forms['Form Responses 1']
const fileInput = document.getElementById('fileInput')
const preview = document.getElementById('preview')
const loading = document.getElementById('loading')
const toast = document.getElementById('toast')

// 🔥 Preview
fileInput.addEventListener('change', () => {
  const file = fileInput.files[0]
  preview.innerHTML = ""

  if (!file) return

  if (file.type.startsWith("image")) {
    const img = document.createElement("img")
    img.src = URL.createObjectURL(file)
    preview.appendChild(img)
  } else if (file.type.startsWith("video")) {
    const video = document.createElement("video")
    video.src = URL.createObjectURL(file)
    video.controls = true
    preview.appendChild(video)
  }
})

// 🔥 Toast
function showToast(msg) {
  toast.innerText = msg
  toast.style.display = "block"
  setTimeout(() => toast.style.display = "none", 3000)
}

form.addEventListener('submit', async e => {
  e.preventDefault()

  const file = fileInput.files[0]

  let base64File = ""
  let fileName = ""

  if (file) {
    fileName = file.name
    base64File = await toBase64(file)
  }

  const formData = new URLSearchParams()
  formData.append("ชื่อบริษัท", form["ชื่อบริษัท"].value)
  formData.append("ชื่อผู้แจ้งและเบอร์ติดต่อ", form["ชื่อผู้แจ้งและเบอร์ติดต่อ"].value)
  formData.append("รุ่นอุปกรณ์", form["รุ่นอุปกรณ์"].value)
  formData.append("ปัญหาที่พบ", form["ปัญหาที่พบ"].value)
  formData.append("file", base64File)
  formData.append("fileName", fileName)

  // ⚡ reset ก่อน (เร็ว)
  form.reset()
  preview.innerHTML = ""
  loading.style.display = "block"

  fetch(scriptURL, {
    method: 'POST',
    body: formData
  })
  .then(() => {
    loading.style.display = "none"
    showToast("✅ บันทึกเรียบร้อย")
  })
  .catch(() => {
    loading.style.display = "none"
    showToast("❌ เกิดข้อผิดพลาด")
  })
})

// 🔥 Base64
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader()
    reader.readAsDataURL(file)
    reader.onload = () => resolve(reader.result.split(',')[1])
    reader.onerror = reject
  })
}
</script>

</body>
</html>
